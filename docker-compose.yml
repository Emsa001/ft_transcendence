services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    develop:
      watch:
        - path: .
          target: .
          action: sync
    ports:
      - "3000:3000"
    depends_on:
      - backend
    env_file:
      - ./frontend/.env

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
