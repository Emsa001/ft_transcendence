  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    networks:
      - monitoring

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "80:80"        # optional if you want http redirect
      - "443:443"      # serve https://localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # mount the compiled frontend (React build output) into nginx
      - ./frontend/dist:/usr/share/nginx/html:ro
    # depends_on:
    #   - backend
    networks:
      - monitoring
  
