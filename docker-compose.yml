services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    networks:
      - monitoring

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    networks:
      - monitoring

  nginx:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: nginx
    ports:
      - "443:443"
      - "8080:8080"
    networks:
      - monitoring
    depends_on:
      - backend
      - frontend

networks:
  monitoring:
