services:
  fastapi-app:
    image: rslim087/fastapi-prometheus:latest
    ports:
      - "8000:8000"
    networks:
      - monitoring

  prometheus: #fastap-app:8000/metrics
    image: prom/prometheus:v2.37.0
    # volume grab file in local and put in container
    volumes: 
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:9.0.0
    environment:
      - GF_SECURITY_ADMIN_PASSOWRD=admin
    ports:
      - "3000:3000"
    networks:
    - monitoring

networks:
  monitoring:
